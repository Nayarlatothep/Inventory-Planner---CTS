    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8edf5 50%, #f5f3f0 100%);
            min-height: 100vh;
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid rgba(0, 31, 63, 0.06);
            box-shadow: 0 1px 3px rgba(0, 31, 63, 0.04), 0 6px 16px rgba(0, 31, 63, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            box-shadow: 0 2px 6px rgba(0, 31, 63, 0.06), 0 12px 28px rgba(0, 31, 63, 0.06);
            transform: translateY(-2px);
        }
        .card-hero {
            background: linear-gradient(135deg, #001f3f 0%, #0a3d6b 60%, #145a8a 100%);
            color: white;
            border: none;
        }
        .card-hero:hover {
            box-shadow: 0 4px 12px rgba(0, 31, 63, 0.15), 0 16px 40px rgba(0, 31, 63, 0.12);
        }
        .badge-up { background: rgba(16, 185, 129, 0.15); color: #047857; }
        .badge-warn { background: rgba(245, 158, 11, 0.12); color: #b45309; }
        .badge-danger { background: rgba(239, 68, 68, 0.1); color: #b91c1c; }
        .stat-value { font-size: 36px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
        .stat-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
        .list-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; border-radius: 10px;
            transition: background 0.2s ease;
        }
        .list-row:hover { background: #f0f4f8; }
        .progress-bar {
            height: 8px; border-radius: 999px; overflow: hidden;
            background: #e8edf5;
        }
        .progress-fill {
            height: 100%; border-radius: 999px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c4c6cf; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #74777f; }
        table th { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #50606f; }
        table td { font-size: 14px; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    <script>
                (function() {
            const btnToggle = document.getElementById('btnSidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const header = document.querySelector('header');
            const main = document.querySelector('main');
            const toggleIcon = document.getElementById('toggleIcon');

            // Detect if it's a page reload
            const isReload = performance.getEntriesByType("navigation")[0]?.type === "reload";
            if (isReload) {
                sessionStorage.removeItem('sidebarCollapsed');
                sessionStorage.removeItem('openSubmenus');
            }

            const toggleSidebar = (manual = true) => {
                const isHidden = sidebar.classList.contains('-translate-x-full');
                
                if (isHidden) {
                    sidebar.classList.remove('-translate-x-full');
                    if (toggleIcon) toggleIcon.textContent = 'chevron_left';
                    if (window.innerWidth >= 768) {
                        if (header) header.classList.add('md:pl-64');
                        if (main) main.classList.add('md:ml-64');
                    } else {
                        if (overlay) overlay.classList.remove('hidden');
                    }
                    if (manual) sessionStorage.setItem('sidebarCollapsed', 'false');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    if (toggleIcon) toggleIcon.textContent = 'chevron_right';
                    if (header) header.classList.remove('md:pl-64');
                    if (main) main.classList.remove('md:ml-64');
                    if (overlay) overlay.classList.add('hidden');
                    if (manual) sessionStorage.setItem('sidebarCollapsed', 'true');
                }
            };

            if (btnToggle) btnToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleSidebar();
            });
            if (overlay) overlay.addEventListener('click', () => toggleSidebar(false));

            const currentFile = window.location.pathname.split('/').pop() || 'index.html';
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentFile) {
                    link.classList.add('bg-blue-600/10', 'text-blue-400', 'border-blue-500/20');
                    link.classList.remove('text-slate-300', 'hover:bg-white/5');
                    const icon = link.querySelector('span.material-symbols-outlined');
                    if (icon) icon.classList.add('text-blue-400');
                }
            });

            // Submenu state management
            let openSubmenus = JSON.parse(sessionStorage.getItem('openSubmenus') || '[]');
            
            const nav = document.querySelector('nav');
            if (nav) {
                const submenuBtns = nav.querySelectorAll('button');
                submenuBtns.forEach(btn => {
                    const spanTitle = btn.querySelector('.font-bold');
                    if (!spanTitle) return;
                    
                    const menuId = spanTitle.textContent.trim();
                    const submenuDiv = btn.nextElementSibling;
                    
                    if (!submenuDiv) return;

                    // Remove inline onclick
                    btn.removeAttribute('onclick');

                    // Restore state
                    if (openSubmenus.includes(menuId)) {
                        submenuDiv.classList.remove('hidden');
                    } else {
                        submenuDiv.classList.add('hidden');
                    }

                    // Add click listener
                    btn.addEventListener('click', () => {
                        const isHidden = submenuDiv.classList.contains('hidden');
                        if (isHidden) {
                            submenuDiv.classList.remove('hidden');
                            if (!openSubmenus.includes(menuId)) openSubmenus.push(menuId);
                        } else {
                            submenuDiv.classList.add('hidden');
                            openSubmenus = openSubmenus.filter(id => id !== menuId);
                        }
                        sessionStorage.setItem('openSubmenus', JSON.stringify(openSubmenus));
                    });
                });
            }

            // Restore sidebar state
            const isSidebarCollapsed = sessionStorage.getItem('sidebarCollapsed');
            
            if (window.innerWidth >= 768) {
                if (isSidebarCollapsed === 'true') {
                    sidebar.classList.add('-translate-x-full');
                    if (header) header.classList.remove('md:pl-64');
                    if (main) main.classList.remove('md:ml-64');
                    if (toggleIcon) toggleIcon.textContent = 'chevron_right';
                } else {
                    sidebar.classList.remove('-translate-x-full');
                    if (header) header.classList.add('md:pl-64');
                    if (main) main.classList.add('md:ml-64');
                    if (toggleIcon) toggleIcon.textContent = 'chevron_left';
                }
            } else {
                sidebar.classList.add('-translate-x-full');
                if (toggleIcon) toggleIcon.textContent = 'chevron_right';
            }
        })();
    </script>
